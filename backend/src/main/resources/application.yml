spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/chronic_disease_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

jwt:
  # Secret must be at least 256 bits (32 chars length)
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 900000 # 15 minutes in ms
  refresh-expiration: 604800000 # 7 days in ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# AgentScope & AI Configuration
agentscope:
  model-configs:
    - model_name: "qwen-max" # Hoặc qwen-plus, qwen-turbo
      model_type: "dashscope_chat"
      api_key: "PASTE_YOUR_DASH_SCOPE_API_KEY_HERE"
  agui:
    enabled: true
    path-prefix: "/v1/ai"
    cors-enable: true
