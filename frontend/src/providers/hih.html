<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Doctor Appointment Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            background: #f4f4f4;
            border-radius: 10px;
            padding: 30px;
            display: flex;
            gap: 30px;
        }

        .form-left {
            flex: 2;
        }

        .form-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .row input,
        .row select {
            flex: 1;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #4a6cf7;
        }

        .full {
            margin-bottom: 15px;
        }

        button {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin: 20px auto 0;
            font-size: 16px;
        }

        button:hover {
            background: #3a56d4;
        }

        img {
            max-width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="form-left">
            <h2>Doctor Appointment Request Form</h2>

            <div class="row">
                <input type="text" placeholder="First name">
                <input type="text" placeholder="Last name">
            </div>

            <div class="row">
                <input type="text" placeholder="Enter a valid phone number">
                <input type="email" placeholder="Enter a valid email address">
            </div>

            <div class="full">
                <input type="text" placeholder="Enter your street address">
            </div>

            <div class="row">
                <input type="date">
                <input type="time">
            </div>

            <div class="row">
                <select>
                    <option>Select Procedure</option>
                    <option>General Checkup</option>
                    <option>Dental</option>
                    <option>Eye</option>
                </select>

                <select>
                    <option>Select Doctor Type</option>
                    <option>General Doctor</option>
                    <option>Specialist</option>
                </select>
            </div>

            <button>Submit</button>
        </div>

        <!-- RIGHT -->
        <div class="form-right">
            <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" alt="doctor">
        </div>

    </div>

</body>

</html>
